{% extends "base.html" %}

{% block title %}Denis ROBERT — Tasks{% endblock %}

{% block styles %}
<style>
/* ── Page wrapper ── */
.tasks-page {
  max-width: 680px;
  margin: 0 auto;
  padding: 64px var(--page-px, 48px) 100px;
}

/* ── En-tête ── */
.tasks-header {
  padding-bottom: 40px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 48px;
  position: relative;
}

.tasks-header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  width: 48px;
  height: 1px;
  background: var(--gold);
}

.tasks-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 12px;
}

.tasks-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 300;
  color: var(--accent);
  line-height: 1.1;
  margin-bottom: 8px;
}

.tasks-title em {
  font-style: italic;
  color: var(--gold);
}

.tasks-meta {
  font-size: 0.8rem;
  color: var(--muted);
  letter-spacing: 0.06em;
}

/* ── Barre d'actions ── */
.tasks-toolbar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.tasks-add-form {
  display: flex;
  flex: 1;
  min-width: 0;
  gap: 10px;
}

.tasks-input {
  flex: 1;
  min-width: 0;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(184,154,106,0.35);
  padding: 10px 2px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.95rem;
  font-weight: 300;
  color: var(--accent);
  outline: none;
  transition: border-color 0.2s;
}

.tasks-input::placeholder { color: var(--muted); opacity: 0.5; }
.tasks-input:focus { border-bottom-color: var(--gold); }

.tasks-add-btn {
  flex-shrink: 0;
  padding: 8px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  font-family: 'Outfit', sans-serif;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}

.tasks-add-btn:hover { background: var(--gold); }

/* Filtre */
.tasks-filter {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}

.filter-btn {
  padding: 7px 14px;
  border: 1px solid var(--line);
  background: none;
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}

.filter-btn:hover { border-color: var(--gold); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── Compteur de progression ── */
.tasks-progress { margin-bottom: 28px; }

.tasks-progress-bar-wrap {
  height: 2px;
  background: var(--line);
  margin-bottom: 10px;
  overflow: hidden;
}

.tasks-progress-bar {
  height: 100%;
  background: var(--gold);
  transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.tasks-progress-label {
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  color: var(--muted);
}

.tasks-progress-label span { color: var(--gold); font-weight: 500; }

/* ── Liste ── */
.tasks-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* ── Item ── */
.task-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 16px 20px;
  border: 1px solid var(--line);
  background: var(--surface);
  transition: border-color 0.2s, opacity 0.2s;
  position: relative;
  overflow: hidden;
  animation: taskAppear 0.3s ease both;
}

@keyframes taskAppear {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.task-item::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.2s;
}

.task-item:hover { border-color: rgba(184,154,106,0.4); }
.task-item:hover::before { opacity: 0.5; }
.task-item:hover .task-delete  { opacity: 1; }
.task-item:hover .task-share-btn { opacity: 1; }

/* Item partagé reçu */
.task-item.shared-in::before { background: #7a9bc9; opacity: 0.4; }

/* Item complété */
.task-item.done { opacity: 0.55; }
.task-item.done::before { background: var(--muted); opacity: 0.3; }

/* ── Checkbox custom ── */
.task-checkbox {
  appearance: none;
  -webkit-appearance: none;
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  border: 1px solid rgba(184,154,106,0.5);
  background: transparent;
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
}

.task-checkbox:hover { border-color: var(--gold); }
.task-checkbox:checked { background: var(--accent); border-color: var(--accent); }
.task-checkbox:disabled { cursor: default; opacity: 0.4; }

.task-checkbox:checked::after {
  content: '';
  position: absolute;
  inset: 3px;
  background: #fff;
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
}

/* ── Texte de la tâche ── */
.task-label {
  flex: 1;
  font-size: 0.92rem;
  font-weight: 300;
  color: var(--accent);
  line-height: 1.5;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}

.task-label::after {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  width: 0%;
  height: 1px;
  background: var(--muted);
  transform: translateY(-50%);
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.task-item.done .task-label { color: var(--muted); }
.task-item.done .task-label::after { width: 100%; }

/* Badge propriétaire partagé */
.task-shared-badge {
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #7a9bc9;
  border: 1px solid rgba(122,155,201,0.35);
  padding: 2px 6px;
  flex-shrink: 0;
  white-space: nowrap;
}

/* ── Boutons d'action (partage + suppression) ── */
.task-share-btn,
.task-delete {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  font-size: 0.85rem;
  line-height: 1;
  transition: color 0.2s, transform 0.15s;
  opacity: 0;
}

.task-share-btn { color: var(--muted); }
.task-share-btn:hover { color: var(--gold); transform: scale(1.2); }

.task-delete { color: var(--line); }
.task-delete:hover { color: #c0392b; transform: scale(1.15); }

/* ── État vide ── */
.tasks-empty {
  text-align: center;
  padding: 64px 0;
  color: var(--muted);
  display: none;
}

.tasks-empty-icon {
  display: block;
  font-size: 2rem;
  margin-bottom: 12px;
  opacity: 0.3;
}

.tasks-empty p {
  font-size: 0.85rem;
  letter-spacing: 0.06em;
}

/* ── Section "Terminées" repliable ── */
.tasks-section-label {
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 24px 0 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.tasks-section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--line);
}

/* ── MODALE PARTAGE ──────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26, 23, 20, 0.55);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--surface);
  border: 1px solid var(--line);
  width: min(520px, 94vw);
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  transform: translateY(20px);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-overlay.open .modal {
  transform: translateY(0);
}

.modal-header {
  padding: 28px 28px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-shrink: 0;
}

.modal-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 300;
  color: var(--accent);
  line-height: 1.2;
}

.modal-task-name {
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
  font-style: italic;
}

.modal-close {
  flex-shrink: 0;
  background: none;
  border: none;
  font-size: 1.1rem;
  color: var(--muted);
  cursor: pointer;
  padding: 4px;
  line-height: 1;
  transition: color 0.2s;
}

.modal-close:hover { color: var(--accent); }

.modal-body {
  padding: 24px 28px;
  overflow-y: auto;
  flex: 1;
}

/* Recherche dans la modale */
.modal-search {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(184,154,106,0.35);
  padding: 8px 2px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  color: var(--accent);
  outline: none;
  margin-bottom: 20px;
  transition: border-color 0.2s;
}

.modal-search:focus { border-bottom-color: var(--gold); }
.modal-search::placeholder { color: var(--muted); opacity: 0.5; }

/* Liste d'utilisateurs */
.share-user-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.share-user-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--line);
  transition: border-color 0.15s;
}

.share-user-item:hover { border-color: rgba(184,154,106,0.4); }

.share-user-avatar {
  width: 32px;
  height: 32px;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 500;
  flex-shrink: 0;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.share-user-name {
  flex: 1;
  font-size: 0.88rem;
  color: var(--accent);
}

/* Sélecteur de permission */
.share-perm-select {
  background: none;
  border: 1px solid var(--line);
  padding: 4px 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  color: var(--muted);
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
}

.share-perm-select:focus { border-color: var(--gold); }

/* Bouton partager / retirer */
.share-toggle-btn {
  padding: 5px 14px;
  border: 1px solid var(--line);
  background: none;
  font-family: 'Outfit', sans-serif;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.share-toggle-btn:hover:not(.shared) { border-color: var(--gold); color: var(--accent); }
.share-toggle-btn.shared { background: var(--accent); color: #fff; border-color: var(--accent); }
.share-toggle-btn.shared:hover { background: #c0392b; border-color: #c0392b; }

/* ── Responsive ── */
@media (max-width: 600px) {
  .tasks-page { padding: 40px 16px 80px; }
  .tasks-toolbar { flex-direction: column; align-items: stretch; }
  .tasks-filter { justify-content: flex-start; }
  .task-delete, .task-share-btn { opacity: 1; }
  .modal-header, .modal-body { padding-left: 20px; padding-right: 20px; }
}
</style>
{% endblock %}

{% block content %}
<div class="tasks-page">

  <!-- En-tête -->
  <header class="tasks-header">
    <p class="tasks-eyebrow">Organisation</p>
    <h1 class="tasks-title">Mes <em>tâches</em></h1>
    <p class="tasks-meta" id="tasks-date"></p>
  </header>

  <!-- Barre d'ajout + filtre -->
  <div class="tasks-toolbar">
    <div class="tasks-add-form">
      <input
        class="tasks-input"
        id="tasks-input"
        type="text"
        placeholder="Ajouter une tâche…"
        maxlength="200"
        autocomplete="off"
      />
      <button class="tasks-add-btn" id="tasks-add-btn">Ajouter</button>
    </div>
    <div class="tasks-filter">
      <button class="filter-btn active" data-filter="all">Toutes</button>
      <button class="filter-btn" data-filter="todo">À faire</button>
      <button class="filter-btn" data-filter="done">Faites</button>
    </div>
  </div>

  <!-- Barre de progression -->
  <div class="tasks-progress">
    <div class="tasks-progress-bar-wrap">
      <div class="tasks-progress-bar" id="tasks-progress-bar"></div>
    </div>
    <p class="tasks-progress-label" id="tasks-progress-label">
      <span id="tasks-count-done">0</span> tâche(s) complétée(s) sur <span id="tasks-count-total">0</span>
    </p>
  </div>

  <!-- Liste principale (à faire) -->
  <ul class="tasks-list" id="tasks-list-todo"></ul>

  <!-- État vide -->
  <div class="tasks-empty" id="tasks-empty">
    <span class="tasks-empty-icon">∅</span>
    <p>Aucune tâche pour le moment.</p>
  </div>

  <!-- Séparateur tâches terminées -->
  <div id="tasks-done-section" style="display:none">
    <p class="tasks-section-label">Terminées</p>
    <ul class="tasks-list" id="tasks-list-done"></ul>
  </div>

</div>

<!-- ── Modale partage ─────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="share-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <div>
        <p class="modal-title" id="modal-title">Partager la tâche</p>
        <p class="modal-task-name" id="modal-task-name"></p>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Fermer">✕</button>
    </div>
    <div class="modal-body">
      <input
        type="text"
        class="modal-search"
        id="modal-search"
        placeholder="Rechercher un utilisateur…"
        autocomplete="off"
      />
      <ul class="share-user-list" id="share-user-list"></ul>
    </div>
  </div>
</div>

<script>
(function () {
  /* ════════════════════════════════════════════════════════
     État
  ════════════════════════════════════════════════════════ */
  let tasks         = [];
  let allUsers      = [];     // {id, username}[]
  let currentFilter = 'all';
  let activeTaskId  = null;   // tâche ouverte dans la modale

  /* ════════════════════════════════════════════════════════
     API helpers
  ════════════════════════════════════════════════════════ */
  async function apiFetch(url, options = {}) {
    const res = await fetch(url, {
      headers: { 'Content-Type': 'application/json' },
      ...options,
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.error || `Erreur ${res.status}`);
    }
    return res.json();
  }

  /* ════════════════════════════════════════════════════════
     Chargement initial
  ════════════════════════════════════════════════════════ */
  async function loadTasks() {
    try {
      tasks = await apiFetch('/api/tasks');
      render();
    } catch (e) {
      console.error('Impossible de charger les tâches :', e);
    }
  }

  async function loadUsers() {
    try {
      allUsers = await apiFetch('/api/tasks/users');
    } catch (e) {
      console.error('Impossible de charger les utilisateurs :', e);
    }
  }

  /* ════════════════════════════════════════════════════════
     Date
  ════════════════════════════════════════════════════════ */
  document.getElementById('tasks-date').textContent = new Date().toLocaleDateString('fr-FR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  /* ════════════════════════════════════════════════════════
     Créer un élément <li>
  ════════════════════════════════════════════════════════ */
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function createItem(task) {
    const li = document.createElement('li');
    const isOwner    = task.is_owner;
    const canWrite   = isOwner || task.permission === 'write';
    const isSharedIn = !isOwner;

    li.className = 'task-item'
      + (task.done       ? ' done'      : '')
      + (isSharedIn      ? ' shared-in' : '');
    li.dataset.id = task.id;

    /* Badge utilisateur partageur */
    const badgeHtml = isSharedIn
      ? `<span class="task-shared-badge" title="Tâche partagée">partagée</span>`
      : '';

    /* Bouton partage (owner uniquement) */
    const shareHtml = isOwner
      ? `<button class="task-share-btn" aria-label="Partager" title="Partager">⇄</button>`
      : '';

    /* Bouton supprimer (owner uniquement) */
    const deleteHtml = isOwner
      ? `<button class="task-delete" aria-label="Supprimer">✕</button>`
      : '';

    li.innerHTML = `
      <input
        type="checkbox"
        class="task-checkbox"
        ${task.done    ? 'checked'  : ''}
        ${!canWrite    ? 'disabled' : ''}
        aria-label="Marquer comme terminée"
      />
      <span class="task-label">${escapeHtml(task.text)}</span>
      ${badgeHtml}
      ${shareHtml}
      ${deleteHtml}
    `;

    /* Toggle done */
    if (canWrite) {
      const cb = li.querySelector('.task-checkbox');
      cb.addEventListener('change', () => toggleDone(task.id));
      li.querySelector('.task-label').addEventListener('click', () => toggleDone(task.id));
    }

    /* Partager */
    const shareBtn = li.querySelector('.task-share-btn');
    if (shareBtn) {
      shareBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        openShareModal(task);
      });
    }

    /* Supprimer */
    const delBtn = li.querySelector('.task-delete');
    if (delBtn) {
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        li.style.transition = 'opacity 0.2s, transform 0.2s';
        li.style.opacity = '0';
        li.style.transform = 'translateX(20px)';
        setTimeout(() => deleteTask(task.id), 200);
      });
    }

    return li;
  }

  /* ════════════════════════════════════════════════════════
     Rendu
  ════════════════════════════════════════════════════════ */
  function render() {
    const listTodo    = document.getElementById('tasks-list-todo');
    const listDone    = document.getElementById('tasks-list-done');
    const empty       = document.getElementById('tasks-empty');
    const doneSection = document.getElementById('tasks-done-section');

    listTodo.innerHTML = '';
    listDone.innerHTML = '';

    const todo = tasks.filter(t => !t.done);
    const done = tasks.filter(t =>  t.done);

    const visibleTodo = currentFilter === 'done' ? [] : todo;
    const visibleDone = currentFilter === 'todo' ? [] : done;

    visibleTodo.forEach((t, i) => {
      const li = createItem(t);
      li.style.animationDelay = (i * 40) + 'ms';
      listTodo.appendChild(li);
    });

    visibleDone.forEach((t, i) => {
      const li = createItem(t);
      li.style.animationDelay = (i * 30) + 'ms';
      listDone.appendChild(li);
    });

    doneSection.style.display = visibleDone.length > 0 ? 'block' : 'none';

    const totalVisible = visibleTodo.length + visibleDone.length;
    empty.style.display = totalVisible === 0 ? 'block' : 'none';

    const total    = tasks.length;
    const doneCount = done.length;
    const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
    document.getElementById('tasks-progress-bar').style.width = pct + '%';
    document.getElementById('tasks-count-done').textContent  = doneCount;
    document.getElementById('tasks-count-total').textContent = total;
  }

  /* ════════════════════════════════════════════════════════
     Actions tâches
  ════════════════════════════════════════════════════════ */
  async function addTask(text) {
    text = text.trim();
    if (!text) return;
    try {
      const task = await apiFetch('/api/tasks', {
        method: 'POST',
        body: JSON.stringify({ text }),
      });
      tasks.unshift(task);
      render();
    } catch (e) {
      alert('Erreur : ' + e.message);
    }
  }

  async function toggleDone(id) {
    try {
      const res = await apiFetch(`/api/tasks/${id}/toggle`, { method: 'PATCH' });
      const t = tasks.find(t => t.id === id);
      if (t) { t.done = res.done; render(); }
    } catch (e) {
      alert('Erreur : ' + e.message);
    }
  }

  async function deleteTask(id) {
    try {
      await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
      tasks = tasks.filter(t => t.id !== id);
      render();
    } catch (e) {
      alert('Erreur : ' + e.message);
    }
  }

  /* ════════════════════════════════════════════════════════
     Modale partage
  ════════════════════════════════════════════════════════ */
  const modal       = document.getElementById('share-modal');
  const modalClose  = document.getElementById('modal-close');
  const modalSearch = document.getElementById('modal-search');
  const userList    = document.getElementById('share-user-list');
  const modalTaskName = document.getElementById('modal-task-name');

  function openShareModal(task) {
    activeTaskId = task.id;
    modalTaskName.textContent = task.text.length > 60
      ? task.text.slice(0, 57) + '…'
      : task.text;
    modalSearch.value = '';
    renderUserList(task);
    modal.classList.add('open');
    modalSearch.focus();
  }

  function closeShareModal() {
    modal.classList.remove('open');
    activeTaskId = null;
  }

  modalClose.addEventListener('click', closeShareModal);
  modal.addEventListener('click', (e) => { if (e.target === modal) closeShareModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeShareModal(); });

  function renderUserList(task) {
    const query = modalSearch.value.trim().toLowerCase();
    const sharedIds = new Set((task.shared_with || []).map(s => s.user_id));

    const filtered = allUsers.filter(u =>
      !query || u.username.toLowerCase().includes(query)
    );

    userList.innerHTML = '';

    if (!filtered.length) {
      userList.innerHTML = '<li style="padding:16px 0;color:var(--muted);font-size:0.85rem;text-align:center;">Aucun utilisateur trouvé</li>';
      return;
    }

    filtered.forEach(user => {
      const isShared   = sharedIds.has(user.id);
      const shareEntry = (task.shared_with || []).find(s => s.user_id === user.id);
      const currentPerm = shareEntry ? shareEntry.permission : 'read';
      const initials    = user.username.slice(0, 2).toUpperCase();

      const li = document.createElement('li');
      li.className = 'share-user-item';
      li.innerHTML = `
        <div class="share-user-avatar">${escapeHtml(initials)}</div>
        <span class="share-user-name">${escapeHtml(user.username)}</span>
        <select class="share-perm-select" aria-label="Permission" ${!isShared ? 'disabled' : ''}>
          <option value="read"  ${currentPerm === 'read'  ? 'selected' : ''}>Lecture</option>
          <option value="write" ${currentPerm === 'write' ? 'selected' : ''}>Écriture</option>
        </select>
        <button class="share-toggle-btn ${isShared ? 'shared' : ''}" data-uid="${user.id}">
          ${isShared ? 'Retirer' : 'Partager'}
        </button>
      `;

      const permSelect = li.querySelector('.share-perm-select');
      const toggleBtn  = li.querySelector('.share-toggle-btn');

      /* Changer la permission */
      permSelect.addEventListener('change', async () => {
        try {
          await apiFetch(`/api/tasks/${activeTaskId}/share`, {
            method: 'POST',
            body: JSON.stringify({ user_id: user.id, permission: permSelect.value }),
          });
          /* Met à jour shared_with en local */
          const t = tasks.find(t => t.id === activeTaskId);
          if (t) {
            const entry = t.shared_with.find(s => s.user_id === user.id);
            if (entry) entry.permission = permSelect.value;
          }
        } catch (e) {
          alert('Erreur : ' + e.message);
        }
      });

      /* Partager / retirer */
      toggleBtn.addEventListener('click', async () => {
        const t = tasks.find(t => t.id === activeTaskId);
        if (!t) return;

        if (isShared) {
          /* Retirer le partage */
          try {
            await apiFetch(`/api/tasks/${activeTaskId}/share/${user.id}`, { method: 'DELETE' });
            t.shared_with = t.shared_with.filter(s => s.user_id !== user.id);
            renderUserList(t);
          } catch (e) {
            alert('Erreur : ' + e.message);
          }
        } else {
          /* Ajouter le partage */
          const perm = permSelect.value || 'read';
          try {
            await apiFetch(`/api/tasks/${activeTaskId}/share`, {
              method: 'POST',
              body: JSON.stringify({ user_id: user.id, permission: perm }),
            });
            t.shared_with.push({ user_id: user.id, username: user.username, permission: perm });
            renderUserList(t);
          } catch (e) {
            alert('Erreur : ' + e.message);
          }
        }
      });

      userList.appendChild(li);
    });
  }

  /* Recherche live dans la modale */
  modalSearch.addEventListener('input', () => {
    const t = tasks.find(t => t.id === activeTaskId);
    if (t) renderUserList(t);
  });

  /* ════════════════════════════════════════════════════════
     Événements toolbar
  ════════════════════════════════════════════════════════ */
  document.getElementById('tasks-add-btn').addEventListener('click', function () {
    const input = document.getElementById('tasks-input');
    addTask(input.value);
    input.value = '';
    input.focus();
  });

  document.getElementById('tasks-input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      addTask(this.value);
      this.value = '';
    }
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      render();
    });
  });

  /* ════════════════════════════════════════════════════════
     Init
  ════════════════════════════════════════════════════════ */
  loadUsers();
  loadTasks();
})();
</script>
{% endblock %}
