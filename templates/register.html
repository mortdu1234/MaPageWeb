{% extends "base.html" %}

{% block title %}Denis ROBERT — Inscription{% endblock %}

{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/buttons.css') }}"/>
{% endblock %}

{% block content %}
<section class="login-wrap">
  <div class="login-card">
    <p class="login-label">Espace privé</p>
    <h1>Créer un<br/><em>compte</em></h1>

    {% if error %}
      <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="field">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" placeholder="Au moins 3 caractères" required autofocus autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Au moins 8 caractères" required autocomplete="new-password"/>
      </div>
      <div class="field">
        <label for="password_confirm">Confirmer le mot de passe</label>
        <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" required autocomplete="new-password"/>
      </div>
      <button type="submit" class="btn btn-outline">Créer le compte</button>
    </form>
    <p class="login-footer">
      Déjà un compte ? <a href="{{ url_for('auth.login') }}">Se connecter</a>
    </p>
  </div>
</section>
{% endblock %}
