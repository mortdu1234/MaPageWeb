<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Denis ROBERT — Mes Projets</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/components/section.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/mesprojets.css') }}"/>
</head>
<body>

  <nav-bar root="/" username="{{ session.get('username', '') }}"></nav-bar>

  <main>
    <div class="section">
      <p class="section-tag">Mes projets</p>
      <h2 class="section-title">Mes Projets</h2>
      <p class="section-lead">Voici l'ensemble de mes projets réalisés</p>

      <!-- ══════════════════════════════════════
           PROJETS PERSONNELS
      ══════════════════════════════════════ -->
      <h3 class="project-category-title">Projets personnels</h3>
      <div class="project-grid">

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='launcherrocketleague') }}"
          type="Personnel"
          name="Launcher Rocket League"
          description="Réalisation d'un nouveau launcher pour le jeu Rocket League sans lancer Epic Games.">
        </project-card>
        
        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='addskipperdc') }}"
          type="Personnel"
          name="Add Skipper Dragon City"
          description="Programme qui permet de quitter automatiquement les pubs dans le jeu mobile Dragon City.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='vpn') }}"
          type="Personnel"
          name="VPN"
          description="Mise en place d'un VPN pour mon domicile avec Wireguard.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='server') }}"
          type="Personnel"
          name="Serveur auto-hébergé"
          description="Mise en place d'un serveur Proxmox qui permet de gérer l'ensemble de cette page et de mon homelab.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='smilelife') }}"
          type="Personnel"
          name="Smile Life"
          description="Réalisation d'une version en ligne de Smile Life en Python.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='resolution2048') }}"
          type="Personnel"
          name="Résolution du jeu 2048"
          description="Programmation d'un script de résolution du jeu 2048.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='serverminecraft') }}"
          type="Personnel"
          name="Hebergement server Minecraft"
          description="Mise en place d'un server minecraft auto-héberger">
        </project-card>


      </div>

      <!-- ══════════════════════════════════════
           PROJETS ACADÉMIQUES
      ══════════════════════════════════════ -->
      <h3 class="project-category-title">Projets académiques</h3>
      <div class="project-grid">

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='generationnombrealeatoire') }}"
          type="Etudes"
          name="Génération de Nombre Aléatoire"
          description="Implémentation en Python d'algorithmes de génération de nombre aléatoire ainsi que de tests statistiques.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='algorithmegenetique') }}"
          type="Etudes"
          name="Algorithme Génétique"
          description="Création d'un algorithme génétique de résolution de labyrinthe.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='jeuloupgarou') }}"
          type="Etudes"
          name="Jeu Loup-Garou"
          description="Implémentation du jeu de loup-garou en Python avec une interface terminale.">
        </project-card>

        <project-card
          href="{{ url_for('projets.detail_projet', nom_projet='jeusplendor') }}"
          type="Etudes"
          name="Jeu Splendor"
          description="Implémentation du jeu Splendor en Java en groupe.">
        </project-card>
        
      </div>
    </div>
  </main>

  <site-footer></site-footer>

  <script src="{{ url_for('static', filename='js/components.js') }}"></script>
</body>
</html>
