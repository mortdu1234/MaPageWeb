{% extends "base.html" %}

{% block title %}Nouveau joueur{% endblock %}

{% block content %}
<div class="nouveau-joueur">
  <h2>Ajouter un joueur</h2>

  {% if error %}
    <p class="flash-msg error">{{ error }}</p>
  {% endif %}

  <form method="POST" action="{{ url_for('joueurs.nouveau_joueur') }}?next={{ next_url }}">
    <input type="hidden" name="next" value="{{ next_url }}">

    <div class="form-group">
      <label for="prenom">Prénom</label>
      <input type="text" id="prenom" name="prenom" placeholder="Prénom" required autofocus>
    </div>

    <div class="form-group">
      <label for="nom">Nom</label>
      <input type="text" id="nom" name="nom" placeholder="Nom" required>
    </div>

    <div class="form-actions">
      <a href="{{ next_url }}" class="btn-secondary">Annuler</a>
      <button type="submit" class="btn-primary">Créer le joueur</button>
    </div>
  </form>
</div>
{% endblock %}
