<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Denis ROBERT — Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }
    .contact-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; color: var(--accent); margin-bottom: 16px; }
    .contact-info p { font-size: 0.95rem; color: var(--muted); line-height: 1.8; margin-bottom: 32px; font-weight: 300; }
    .contact-detail { display: flex; flex-direction: column; gap: 16px; }
    .contact-item { display: flex; align-items: center; gap: 14px; font-size: 0.9rem; color: var(--text); }
    .contact-item-icon { width: 38px; height: 38px; border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .contact-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .form-group input, .form-group textarea { padding: 13px 16px; border: 1px solid var(--line); background: var(--surface); font-family: 'Outfit', sans-serif; font-size: 0.95rem; color: var(--text); outline: none; transition: border-color 0.2s; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); }
    .form-group textarea { min-height: 120px; }
    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav-bar root="./"></nav-bar>

  <main>
    <div class="section">
      <p class="section-tag">Restons en contact</p>
      <h2 class="section-title">Contact</h2>
      <div class="contact-grid">
        <div class="contact-info">
          <h3>Écrivez-moi</h3>
          <p>Une question sur un jeu, une proposition de collaboration ou simplement l'envie d'échanger ? Je lis tous les messages avec plaisir.</p>
          <div class="contact-detail">
            <div class="contact-item"><span class="contact-item-icon">✉</span><span>dr05@orange.fr</span></div>
            <div class="contact-item"><span class="contact-item-icon">📍</span><span>France</span></div>
            <div class="contact-item"><span class="contact-item-icon">🕐</span><span>Réponse sous 48h</span></div>
          </div>
        </div>
        <form class="contact-form" onsubmit="handleSubmit(event)">
          <div class="form-group"><label>Nom</label><input type="text" placeholder="Votre nom complet" required/></div>
          <div class="form-group"><label>Email</label><input type="email" placeholder="votre@email.com" required/></div>
          <div class="form-group"><label>Message</label><textarea placeholder="Votre message…" required></textarea></div>
          <button type="submit" class="btn btn-primary">Envoyer le message</button>
        </form>
      </div>
    </div>
  </main>

  <site-footer></site-footer>

  <script src="js/components.js"></script>
</body>
</html>
