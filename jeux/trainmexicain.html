<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Train Mexicain</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .game-detail { max-width: 760px; margin: 0 auto; padding: 60px 48px; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; font-size: 0.78rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); text-decoration: none; margin-bottom: 48px; transition: color 0.2s; }
    .back-btn:hover { color: var(--accent); }
    .back-btn::before { content: "←"; }
    .game-icon-lg { font-size: 3rem; display: block; margin-bottom: 16px; }
    .game-detail h2 { font-family: "Cormorant Garamond", serif; font-size: clamp(36px, 5vw, 58px); font-weight: 300; color: var(--accent); margin-bottom: 16px; line-height: 1.1; }
    .game-meta { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 36px; }
    .game-meta span { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .game-meta span strong { color: var(--accent); }
    .game-body { font-size: 1rem; color: #3e3730; line-height: 1.9; font-weight: 300; }
    .game-body p { margin-bottom: 20px; }
    .game-body h3 { font-family: "Cormorant Garamond", serif; font-size: 1.4rem; font-weight: 600; color: var(--accent); margin: 36px 0 12px; }
    @media (max-width: 768px) { .game-detail { padding: 40px 24px; } }
  </style>
</head>
<body>

  <nav-bar root="../"></nav-bar>

  <main>
    <div class="game-detail">
        <game-hero-banner name="Train Mexicain" player="2-5" duree="60-180" age="10"></game-hero-banner>
        
        
        <div class="game-body">
          <p>XXXXX</p>
          <h3>XXXXX</h3>
          <p>XXXXX</p>
          <h3>XXXXX</h3>
          <p>XXXXX</p>
        </div>
    </div>
  </main>

  <site-footer></site-footer>

  <script src="../js/components.js"></script>
</body>
</html>
